    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }
    #result {
      margin-top: 30px;
      font-size: 20px;
    }
    #imageContainer {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    img {
      width: 220px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }


  /* フェード */
  .fade {
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ポップ */
  .pop {
    animation: pop 0.3s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); }
    80% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* 光る（レア用） */
  .glow {
    box-shadow: 0 0 20px gold, 0 0 40px gold;
  }

  /* 少し遅れて出す用 */
  .hidden {
    opacity: 0;
  }

  </style>

  return list[Math.floor(Math.random() * list.length)];
}

function filterCharacters(trait) {
  return characters.filter(c => c.traits.includes(trait));
}

function getRarityName(rarity) {
  return {
    1: "ノーマル",
    2: "スーパー",
    3: "ハイパー",
    4: "マスター"
  }[rarity];
}

let lastTrait = null;
let gachaLocked = false;


function gacha(rarity) {

  if (gachaLocked) return; // ロック中なら何もしない
  gachaLocked = true;      // ボタンを押した瞬間ロック

  const trait = getRandomTrait(rarity);
  lastTrait = trait;
  drawCharacters(trait, rarity);
}

function drawCharacters(trait, rarity=null) {
  let candidates = filterCharacters(trait);

  const resultDiv = document.getElementById("result");
  const imgContainer = document.getElementById("imageContainer");

  imgContainer.innerHTML = "";

  if (candidates.length === 0) {
    resultDiv.innerHTML = `条件: ${trait}<br>該当キャラなし`;
    gachaLocked = false; // ロック解除
    return;
  }

  // シャッフル
  candidates = candidates.sort(() => 0.5 - Math.random());
  const selected = candidates.slice(0, 5);

  // 色処理（そのまま使う）
  let color = traitColors[trait] || "#000";
  let backgroundStyle = color;

  if (trait === "ブイズ") {
    backgroundStyle = "linear-gradient(90deg, #ff6b6b, #4dabf7, #69db7c, #ffd43b, #f783ac, #845ef7)";
  }

  document.body.style.background =
    trait === "ブイズ"
      ? "linear-gradient(135deg, #ff6b6b22, #4dabf722, #69db7c22)"
      : `linear-gradient(135deg, ${color}33, ${color}11)`;

  const textColor = (trait === "白" || trait === "黄色" || trait === "サポート型") ? "#000" : "#fff";

  // 結果テキスト（フェード）
  resultDiv.innerHTML = `
    ${rarity ? `レアリティ: ${getRarityName(rarity)}<br>` : ""}
    条件: <span style="
      background:${backgroundStyle};
      color:${textColor};
      padding:6px 14px;
      border-radius:12px;
      font-weight:bold;
      display:inline-block;
    ">
      ${trait}
    </span><br>
    結果:
    <div id="nameList"></div>
  `;  resultDiv.classList.add("fade");

  // 1体ずつ表示
  selected.forEach((character, index) => {
    const img = document.createElement("img");
    img.src = character.img;
    img.style.margin = "10px";
    img.classList.add("hidden");

    imgContainer.appendChild(img);

    setTimeout(() => {
      img.classList.remove("hidden");
      img.classList.add("pop", "fade", "glow");
      
      const span = document.createElement("span");
      span.textContent = character.name + " ";
      span.classList.add("fade");
      nameList.appendChild(span);

      // 最後のキャラが表示されたらボタンロック解除
      if (index === selected.length - 1) {
        gachaLocked = false;
      }

    }, index * 500); // ← ずれる時間設定
  });
}
  </script>
